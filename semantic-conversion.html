    <title>My Site</title>
</head>
<body>

    <!-- Header with site logo and navigation -->

        <div class="logo">My Site</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Primary article -->
        <article>
            <h1>Welcome to My Site</h1>
            <p>This is my first paragraph...</p>
            <p>This is my second paragraph...</p>

    <!-- Footer -->
    <footer>
        <p>© 2026</p>
